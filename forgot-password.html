<!DOCTYPE html>
<html lang="en">
<head>

<meta http-equiv="Content-Security-Policy"content="default-src 'self';script-src 'self';style-src 'self' 'unsafe-inline';connect-src 'self' http://localhost:5000;img-src 'self' data:;">

<title>Forgot Password</title>

<link rel="stylesheet" href="css/forgotpass.css">

</head>

<body>

<section class="auth-panel">

  <div class="panel-card">

    <p class="panel-kicker">
      Password Recovery
    </p>

    <h2>
      Forgot your password?
    </h2>

    <form id="forgotForm">

      <label>

        <span>Email Address</span>

        <input
          type="email"
          name="email"
          id="email"
          placeholder="Enter your email"
          required
        >

      </label>

      <div
        class="auth-message"
        id="message"
        style="display:none;"
      ></div>

      <button type="submit">
        Send Reset Link
      </button>

    </form>

  </div>

</section>

<!-- IMPORTANT -->
<script src="js/forgotpassword.js"></script>

</body>
</html>
